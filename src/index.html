<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中考倒计时</title>
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app" class="theme-blue-purple">
    <!-- 标题栏 -->
    <div class="title-bar" id="titleBar">
      <div class="title-bar-left">
        <span class="app-badge">🎯</span>
        <span class="title-bar-text" id="titleBarText">中考倒计时</span>
      </div>
      <div class="title-bar-buttons">
        <!-- 置顶 -->
        <button class="tb-btn btn-pin" id="btnPin" title="置顶">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 4.5L18.5 8 13 13.5 10.5 16 8 13.5 13 8.5z"/>
            <path d="M9 15L4.5 19.5"/>
            <path d="M14.5 4L20 9.5"/>
          </svg>
        </button>
        <!-- 缩小/放大 -->
        <button class="tb-btn btn-compact" id="btnCompact" title="缩小为桌面小窗">
          <svg class="icon-shrink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 14 10 14 10 20"/>
            <polyline points="20 10 14 10 14 4"/>
            <line x1="14" y1="10" x2="21" y2="3"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <!-- 最小化到任务栏 -->
        <button class="tb-btn btn-minimize" id="btnMinimize" title="最小化到任务栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="6" y1="12" x2="18" y2="12"/>
          </svg>
        </button>
        <!-- 关闭（隐藏到托盘） -->
        <button class="tb-btn btn-close" id="btnClose" title="关闭（隐藏到托盘）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
      <!-- 顶部标题 -->
      <div class="header-section">
        <h1 class="main-title" id="mainTitle">中考倒计时</h1>
        <p class="target-school" id="targetSchool"></p>
      </div>

      <!-- 倒计时核心 -->
      <div class="countdown-section">
        <div class="countdown-card">
          <div class="countdown-label">距离中考还有</div>
          <div class="countdown-days-wrapper">
            <span class="countdown-days" id="countdownDays">0</span>
            <span class="countdown-days-unit">天</span>
          </div>
          <div class="countdown-detail" id="countdownDetail">
            <span class="detail-item"><span id="hours">00</span><small>时</small></span>
            <span class="detail-sep">:</span>
            <span class="detail-item"><span id="minutes">00</span><small>分</small></span>
            <span class="detail-sep" id="secSep">:</span>
            <span class="detail-item" id="secItem"><span id="seconds">00</span><small>秒</small></span>
          </div>
          <div class="exam-date" id="examDateDisplay">目标日期：2026年6月14日</div>
        </div>
      </div>

      <!-- 励志名言 -->
      <div class="quote-section">
        <div class="quote-card" id="quoteCard">
          <div class="quote-icon">✨</div>
          <p class="quote-text" id="quoteText">加载中...</p>
          <p class="quote-author" id="quoteAuthor"></p>
        </div>
      </div>

      <!-- 重要日期 -->
      <div class="dates-section" id="datesSection">
        <h3 class="section-title">📅 重要日期</h3>
        <div class="dates-list" id="datesList"></div>
      </div>

      <!-- 底部操作栏 -->
      <div class="bottom-bar">
        <button class="action-btn" id="btnRefreshQuote" title="换一句">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          <span>换一句</span>
        </button>
        <button class="action-btn" id="btnSettings" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>设置</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/quotes.js"></script>
  <script src="js/renderer.js"></script>
</body>
</html>
